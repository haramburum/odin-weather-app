<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Weather App</title><link rel="icon" href="favicon.ico"><script defer="defer" src="js/main.js"></script><link href="css/main.css" rel="stylesheet"></head><body><div class="weather-app"><div class="weather-card"><form class="weather-card__form"><button type="submit" class="weather-card__search-btn"></button> <input type="search" class="weather-card__search-input" placeholder="Search for a city...(e.g., Moscow, Tokyo)"/></form><div class="weather-card__main"><p class="weather-card__location"></p><p class="weather-card__temp"></p><img src="https://raw.githubusercontent.com/visualcrossing/WeatherIcons/58c79610addf3d4d91471abbb95b05e96fb43019/SVG/1st%20Set%20-%20Monochrome/clear-day.svg" alt="" class="weather-card__icon"/><p class="weather-card__description"></p><div class="weather-card__toggler"><span>&#x2103;/&#8457;</span> <label class="weather-card__switch switch"><input class="weather-card__toggleTempMeasure" type="checkbox"/> <span class="switch__slider switch__round"></span></label></div></div><div class="weather-card__details details"><h2 class="details__title">Weather Details</h2><div class="details__container"><div class="details-card"><div class="details-card__icon"><img src="img/fce53b9b695a47797cc6.svg" alt="feelslike"/></div><div class="details-card__title">Feels Like:<p class="details-card__data details-card__data--feels-like"></p></div></div><div class="details-card"><div class="details-card__icon"><img src="img/4c997f0c9e55dcc53e0e.svg" alt="humidity"/></div><div class="details-card__title">Humidity:<p class="details-card__data details-card__data--humidity"></p></div></div><div class="details-card"><div class="details-card__icon"><img src="img/fd8777d074a869a08350.svg" alt="wind speed"/></div><div class="details-card__title">Wind Speed:<p class="details-card__data details-card__data--wind-speed"></p></div></div><div class="details-card"><div class="details-card__icon"><img src="img/4c85a1ba9589b38eb414.svg" alt="visibility"/></div><div class="details-card__title">Visibility:<p class="details-card__data details-card__data--visibility"></p></div></div></div></div></div><div class="loader hide"><p>Loading data...</p></div></div></body></html>
